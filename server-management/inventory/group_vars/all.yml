---
# Shared variables for all hosts
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/.ssh/vprofile-key.pem
ansible_python_interpreter: /usr/bin/python3

# AWS variables
region: us-east-2
aws_region: us-east-2
project_name: Vprofile
owner: DevOps Team

# Ubuntu package cache
apt_cache_valid_time: 3600
