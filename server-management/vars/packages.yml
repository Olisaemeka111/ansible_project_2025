---
# Package installation variables for 3-Tier Architecture
# Ubuntu 22.04 LTS

# ============================================================================
# COMMON PACKAGES (all tiers)
# ============================================================================
packages_common:
  - curl
  - wget
  - unzip
  - git
  - htop
  - net-tools
  - nano
  - vim
  - tree
  - jq
  - awscli
  - ca-certificates
  - openssl

# ============================================================================
# WEB TIER PACKAGES
# Purpose: Frontend/reverse proxy servers (HTTP/HTTPS)
# ============================================================================
packages_web:
  - nginx                    # Web server / reverse proxy
  - certbot                  # Let's Encrypt certificate management
  - python3-certbot-nginx    # Certbot nginx plugin
  - fail2ban                 # DDoS/brute force protection
  - ufw                      # Firewall management
  - php-fpm                  # PHP FastCGI Process Manager (if needed)
  - php-mysql                # PHP MySQL support

# ============================================================================
# APP TIER PACKAGES
# Purpose: Application runtime servers (Java, Node.js, Python, Docker)
# ============================================================================
packages_app_common:
  - build-essential           # GCC compiler, make, etc.
  - libssl-dev                # OpenSSL development libraries
  - libffi-dev                # Foreign Function Interface library
  - git                       # Version control

# Java 17 JDK
java_package: openjdk-17-jdk
java_packages:
  - openjdk-17-jdk
  - openjdk-17-jre
  - openjdk-17-jdk-headless

# Python 3
python_packages:
  - python3
  - python3-pip
  - python3-venv
  - python3-dev
  - python3-urllib3
  - python3-requests

# Python pip packages (boto3 for AWS API access)
pip_packages:
  - boto3
  - botocore
  - requests
  - python-dotenv

# Node.js 20
nodejs_version: "20"
nodejs_packages:
  - nodejs
  - npm

# Docker & Container Runtime
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-compose-plugin
  - docker-buildx-plugin

# ============================================================================
# DATABASE TIER PACKAGES
# Purpose: Database server tools and utilities
# Note: Actual database engines (MySQL, PostgreSQL) installed separately
# These are client tools for management and verification
# ============================================================================
packages_db:
  - mysql-client              # MySQL client tools
  - postgresql-client         # PostgreSQL client tools
  - redis-tools               # Redis CLI
  - sqlite3                   # SQLite client

# Monitoring/Logging on all DB servers
packages_db_monitoring:
  - collectd                  # System monitoring

# ============================================================================
# TIER-SPECIFIC GROUPS (for easy reference in playbooks)
# ============================================================================
packages_for_web_tier: "{{ packages_common + packages_web }}"
packages_for_app_tier: "{{ packages_common + packages_app_common + java_packages + python_packages + nodejs_packages + docker_packages }}"
packages_for_db_tier: "{{ packages_common + packages_db + packages_db_monitoring }}"

# ============================================================================
# SERVICE PORTS (used for security group rules documentation)
# ============================================================================
app_tier_ports:
  - port: 8000
    protocol: tcp
    description: "Default app port (Flask, Django, etc.)"
  - port: 8080
    protocol: tcp
    description: "Alternative app port (Tomcat, etc.)"
  - port: 3000
    protocol: tcp
    description: "Node.js default port"
  - port: 5000
    protocol: tcp
    description: "Flask default port"
  - port: 9000
    protocol: tcp
    description: "Alternative app port"

database_ports:
  - port: 3306
    protocol: tcp
    description: "MySQL/MariaDB"
  - port: 5432
    protocol: tcp
    description: "PostgreSQL"
  - port: 27017
    protocol: tcp
    description: "MongoDB"
  - port: 6379
    protocol: tcp
    description: "Redis"
  - port: 27018
    protocol: tcp
    description: "MongoDB config server"
  - port: 27019
    protocol: tcp
    description: "MongoDB shard server"
