---
# Additional Software Installation Configuration
# Edit this file to enable/disable software, then push to main.
# Or run manually from control node:
#   ansible-playbook playbooks/install_additional.yml
#   ansible-playbook playbooks/install_monitoring.yml

# ============================================================================
# APP TIER - Application Software
# ============================================================================

# Jenkins CI/CD
jenkins_enabled: true
jenkins_port: 8080
jenkins_java_package: openjdk-17-jdk

# Docker (already installed via package_install.yml, ensures it's present)
docker_enabled: true
docker_user: ubuntu

# ============================================================================
# MONITORING STACK (All Tiers)
# ============================================================================

# Prometheus Node Exporter - installed on ALL servers (web, app, db)
# Collects CPU, memory, disk, network metrics
node_exporter_enabled: true
node_exporter_version: "1.8.2"
node_exporter_port: 9100

# Prometheus Server - installed on app-01 only (monitoring hub)
prometheus_enabled: true
prometheus_version: "2.53.0"
prometheus_port: 9090
prometheus_retention: "30d"
prometheus_scrape_interval: "15s"

# Grafana - installed on app-01 only (dashboards)
grafana_enabled: true
grafana_port: 3000

# Alertmanager - installed on app-01 alongside Prometheus
alertmanager_enabled: true
alertmanager_version: "0.27.0"
alertmanager_port: 9093

# cAdvisor - container metrics on app tier (where Docker runs)
cadvisor_enabled: true
cadvisor_port: 8081
