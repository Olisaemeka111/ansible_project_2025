---
- name: Provision Web Tier Servers (10 servers in public subnets)
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/servers.yml
    - ../vars/security_groups_output.yml
    - ../vars/output_vars.yml

  tasks:
    - name: Display Web Tier provisioning info
      debug:
        msg: |
          [WEB] PROVISIONING WEB TIER
          ------------------------------------------
          Servers: 10 (vprofile-web-01 to vprofile-web-10)
          Subnets: Public (pubsub1, pubsub2, pubsub3)
          Security Group: {{ web_tier_sg_id }}
          Instance Type: {{ instance_type }}
          Region: {{ region }}

    - name: Provision Web Tier Servers
      amazon.aws.ec2_instance:
        region: "{{ region }}"
        image_id: "{{ ubuntu_22_04_ami }}"
        instance_type: "{{ instance_type }}"
        key_name: "{{ key_name }}"
        security_group: "{{ web_tier_sg_id }}"
        vpc_subnet_id: "{{ public_subnets[item.subnet_index].subnet_id }}"
        ebs_optimized: false
        detailed_monitoring: false
        network_interfaces:
          - assign_public_ip: false
            delete_on_termination: true
            device_index: 0
        tags:
          Name: "{{ item.name }}"
          Tier: "{{ item.tier }}"
          Role: "{{ item.role }}"
          Project: "{{ tags_common.Project }}"
          Owner: "{{ tags_common.Owner }}"
          ManagedBy: "{{ tags_common.ManagedBy }}"
        wait: true
        state: present
      loop: "{{ web_servers }}"
      register: web_instances_result

    - name: Wait for Web Tier instances to be running
      amazon.aws.ec2_instance_info:
        instance_ids: "{{ web_instances_result.results | map(attribute='instances') | flatten | map(attribute='instance_id') | list }}"
        region: "{{ region }}"
      register: web_instances_info
      until: web_instances_info.instances | selectattr('state.name', 'equalto', 'running') | list | length == 10
      retries: 30
      delay: 5

    - name: Store Web Tier instances
      set_fact:
        web_tier_instances: "{{ web_instances_info.instances }}"

