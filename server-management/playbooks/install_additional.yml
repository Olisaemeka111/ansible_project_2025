---
- name: Install Additional Software on App Tier
  hosts: app_tier
  serial: 10
  become: true

  vars_files:
    - ../vars/additional_packages.yml

  tasks:
    # ========================================================================
    # JENKINS
    # ========================================================================
    - name: Install Jenkins
      when: jenkins_enabled | default(false)
      block:
        - name: Ensure Java 17 is installed (Jenkins requirement)
          ansible.builtin.apt:
            name: "{{ jenkins_java_package }}"
            state: present
            update_cache: yes

        - name: Clean up all legacy Jenkins and Docker apt key entries
          ansible.builtin.shell: |
            # Remove stale Jenkins repo files (any format)
            rm -f /etc/apt/sources.list.d/jenkins*.list
            rm -f /etc/apt/sources.list.d/jenkins*.sources
            # Remove old Jenkins keys from legacy keyring
            apt-key del 5BA31D57EF5975CA 2>/dev/null || true
            apt-key del 7198F4B714ABFC68 2>/dev/null || true
            # Remove old Docker key from legacy keyring
            apt-key del 0EBFCD88 2>/dev/null || true
            # Remove stale keyring files
            rm -f /usr/share/keyrings/jenkins-keyring.asc
            rm -f /usr/share/keyrings/jenkins-keyring.gpg
            rm -f /etc/apt/trusted.gpg.d/jenkins*.gpg
          changed_when: true

        - name: Fetch Jenkins GPG key and import from keyserver
          ansible.builtin.shell: |
            export GNUPGHOME=$(mktemp -d)
            # Download the official Jenkins key
            curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | gpg --import 2>/dev/null || true
            # Also fetch the new signing key from keyserver
            gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 7198F4B714ABFC68 2>/dev/null || true
            # Export all imported keys to the keyring file
            gpg --export --output /usr/share/keyrings/jenkins-keyring.gpg
            chmod 644 /usr/share/keyrings/jenkins-keyring.gpg
            rm -rf "$GNUPGHOME"

        - name: Verify Jenkins keyring file exists
          ansible.builtin.stat:
            path: /usr/share/keyrings/jenkins-keyring.gpg
          register: jenkins_keyring

        - name: Fail if Jenkins keyring not created
          ansible.builtin.fail:
            msg: "Failed to create Jenkins keyring at /usr/share/keyrings/jenkins-keyring.gpg"
          when: not jenkins_keyring.stat.exists

        - name: Add Jenkins repository with signed-by
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.gpg] https://pkg.jenkins.io/debian-stable binary/"
            state: present
            filename: jenkins
            update_cache: yes

        - name: Install Jenkins
          ansible.builtin.apt:
            name: jenkins
            state: present

        - name: Start and enable Jenkins service
          ansible.builtin.systemd:
            name: jenkins
            state: started
            enabled: yes

        - name: Wait for Jenkins to start
          ansible.builtin.wait_for:
            port: "{{ jenkins_port }}"
            delay: 10
            timeout: 120

        - name: Get Jenkins initial admin password
          ansible.builtin.command: cat /var/lib/jenkins/secrets/initialAdminPassword
          register: jenkins_password
          changed_when: false

        - name: Display Jenkins info
          ansible.builtin.debug:
            msg: |
              Jenkins installed on {{ inventory_hostname }}
              URL: http://{{ ansible_host }}:{{ jenkins_port }}
              Initial Admin Password: {{ jenkins_password.stdout }}

    # ========================================================================
    # DOCKER (ensure running)
    # ========================================================================
    - name: Ensure Docker is installed and running
      when: docker_enabled | default(false)
      block:
        - name: Check if Docker is installed
          ansible.builtin.command: docker --version
          register: docker_check
          changed_when: false
          ignore_errors: true

        - name: Migrate Docker to signed-by keyring (fix legacy warning)
          ansible.builtin.shell: |
            # Download Docker GPG key to proper keyring location
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
              gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
            chmod 644 /usr/share/keyrings/docker-archive-keyring.gpg
            # Remove old Docker key from legacy keyring
            apt-key del 0EBFCD88 2>/dev/null || true
            # Remove old unsigned Docker repo entry
            rm -f /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
          args:
            creates: /usr/share/keyrings/docker-archive-keyring.gpg

        - name: Ensure Docker repo uses signed-by
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present
            filename: docker
            update_cache: yes

        - name: Install Docker if not present
          when: docker_check.rc != 0
          block:
            - name: Install Docker packages
              ansible.builtin.apt:
                name:
                  - docker-ce
                  - docker-ce-cli
                  - containerd.io
                  - docker-compose-plugin
                  - docker-buildx-plugin
                state: present

        - name: Start and enable Docker service
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: yes

        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ docker_user }}"
            groups: docker
            append: yes

        - name: Verify Docker
          ansible.builtin.command: docker --version
          register: docker_version
          changed_when: false

        - name: Display Docker info
          ansible.builtin.debug:
            msg: "Docker: {{ docker_version.stdout }} on {{ inventory_hostname }}"

    # ========================================================================
    # SUMMARY
    # ========================================================================
    - name: Installation summary
      ansible.builtin.debug:
        msg: |
          Additional software installed on {{ inventory_hostname }}
          Jenkins: {{ 'YES (port ' + jenkins_port|string + ')' if jenkins_enabled | default(false) else 'SKIPPED' }}
          Docker:  {{ 'YES' if docker_enabled | default(false) else 'SKIPPED' }}
