# ============================================================================
# TEMPORARY: Open DB tier egress for patching
# ============================================================================
- name: Open DB Tier egress temporarily for patching
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/security_groups_output.yml
    - ../vars/output_vars.yml

  tasks:
    - name: Add temporary egress rules to DB tier SG
      amazon.aws.ec2_group:
        name: vprofile-db-tier-sg
        description: "Database Tier - Restricted database servers (private subnets)"
        vpc_id: "{{ vpc_id }}"
        region: "{{ region }}"
        purge_rules: false
        purge_rules_egress: true
        rules_egress:
          - proto: udp
            ports: [53]
            cidr_ip: 0.0.0.0/0
            rule_desc: "TEMP - DNS for patching"
          - proto: tcp
            ports: [443]
            cidr_ip: 0.0.0.0/0
            rule_desc: "TEMP - HTTPS for patching"
          - proto: tcp
            ports: [80]
            cidr_ip: 0.0.0.0/0
            rule_desc: "TEMP - HTTP for patching"
        state: present

    - name: Display temporary egress status
      debug:
        msg: "[OPEN] DB tier egress temporarily opened for patching"

