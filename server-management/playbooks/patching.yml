---
- name: Patch and Upgrade Web Tier
  hosts: web_tier
  serial: 10
  become: true

  pre_tasks:
    - name: Check for running services before patching
      shell: systemctl list-units --state=running --no-pager | grep -E '\.service' | wc -l
      register: running_services
      changed_when: false

    - name: Display pre-patch service count
      debug:
        msg: "{{ inventory_hostname }} has {{ running_services.stdout }} running services"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes
      register: upgrade_result

    - name: Display upgraded packages
      debug:
        msg: "Upgraded packages on {{ inventory_hostname }}"
      when: upgrade_result.changed

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot system if kernel was updated
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible patching playbook"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: reboot_required.stat.exists

    - name: Wait for system to be ready
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      when: reboot_required.stat.exists

    - name: Verify system is operational
      ansible.builtin.command: uname -a
      register: system_info
      changed_when: false

    - name: Display system info after patching
      debug:
        msg: "{{ system_info.stdout }}"

  post_tasks:
    - name: Check services after patching
      shell: systemctl list-units --state=running --no-pager | grep -E '\.service' | wc -l
      register: running_services_after
      changed_when: false

    - name: Log patching summary
      copy:
        content: |
          Patching Summary - {{ ansible_date_time.iso8601 }}
          ================================================
          Host: {{ inventory_hostname }}
          Tier: web
          IP: {{ ansible_host }}

          Packages Upgraded: {{ upgrade_result.changed }}
          Reboot Required: {{ reboot_required.stat.exists }}
          Running Services Before: {{ running_services.stdout }}
          Running Services After: {{ running_services_after.stdout }}

          System Information:
          {{ system_info.stdout }}
        dest: "/tmp/patch_{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}.txt"
      delegate_to: localhost
      become: false

