---
- name: Install Packages on Web Tier
  hosts: web_tier
  serial: 10
  become: true

  vars_files:
    - ../vars/packages.yml

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ packages_common }}"
        state: present

    - name: Install web tier packages (Nginx, etc.)
      ansible.builtin.apt:
        name: "{{ packages_web }}"
        state: present

    - name: Create package installation report
      copy:
        content: |
          Package Installation Report - Web Tier
          =======================================
          Hostname: {{ inventory_hostname }}
          IP: {{ ansible_host }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          Tier: web

          Common Packages: {{ packages_common | join(', ') }}
          Web Packages: {{ packages_web | join(', ') }}
        dest: "/tmp/package_install_{{ inventory_hostname }}.txt"

    - name: Display installation status
      debug:
        msg: "[OK] Packages installed on {{ inventory_hostname }}"

- name: Install Packages on App Tier
  hosts: app_tier
  serial: 10
  become: true

  vars_files:
    - ../vars/packages.yml

  tasks:
    # ------------------------------------------------------------------
    # PRE-TASK: Clean up broken repos from previous runs before any apt update
    # ------------------------------------------------------------------
    - name: Clean up legacy apt-key entries and unsigned repo files
      ansible.builtin.shell: |
        # Remove ALL Docker repo files (any naming from previous runs)
        rm -f /etc/apt/sources.list.d/docker*.list
        rm -f /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
        # Remove Docker key from legacy keyring
        apt-key del 0EBFCD88 2>/dev/null || true
        # Remove old Docker keyring file (force fresh download)
        rm -f /usr/share/keyrings/docker-archive-keyring.gpg
      changed_when: true

    - name: Download Docker GPG key to signed-by keyring
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
          gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
        chmod 644 /usr/share/keyrings/docker-archive-keyring.gpg

    - name: Write Docker repo file with signed-by
      ansible.builtin.copy:
        content: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable\n"
        dest: /etc/apt/sources.list.d/docker.list
        owner: root
        group: root
        mode: "0644"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 0

    # ------------------------------------------------------------------
    # Package installation
    # ------------------------------------------------------------------
    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ packages_common }}"
        state: present

    - name: Install Java 17
      ansible.builtin.apt:
        name: "{{ java_packages }}"
        state: present

    - name: Verify Java installation
      ansible.builtin.command: java -version
      register: java_version
      changed_when: false

    - name: Install Python 3 and development tools
      ansible.builtin.apt:
        name: "{{ packages_app_common + python_packages }}"
        state: present

    - name: Verify Python installation
      ansible.builtin.command: python3 --version
      register: python_version
      changed_when: false

    - name: Install Python pip packages
      ansible.builtin.pip:
        name: "{{ pip_packages }}"
        executable: pip3
        state: present

    - name: Setup Node.js repository (NodeSource)
      block:
        - name: Download NodeSource setup script
          ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          register: nodejs_setup
          changed_when: nodejs_setup.rc == 0

        - name: Install Node.js
          ansible.builtin.apt:
            name: nodejs
            state: present

    - name: Verify Node.js installation
      ansible.builtin.command: node --version
      register: node_version
      changed_when: false

    - name: Install Docker CE and plugins
      block:
        - name: Install Docker packages
          ansible.builtin.apt:
            name: "{{ docker_packages }}"
            state: present

        - name: Start Docker service
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: yes

        - name: Add ubuntu user to docker group
          ansible.builtin.user:
            name: ubuntu
            groups: docker
            append: yes

    - name: Verify Docker installation
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Create package installation report
      copy:
        content: |
          Package Installation Report - App Tier
          =======================================
          Hostname: {{ inventory_hostname }}
          IP: {{ ansible_host }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          Tier: app

          Java Version:
          {{ java_version.stderr }}

          Python Version:
          {{ python_version.stdout }}

          Node.js Version:
          {{ node_version.stdout }}

          Docker Version:
          {{ docker_version.stdout }}

          Pip Packages Installed: {{ pip_packages | join(', ') }}
        dest: "/tmp/package_install_{{ inventory_hostname }}.txt"

    - name: Display installation status
      debug:
        msg: "[OK] All packages installed on {{ inventory_hostname }}"

# ============================================================================
# TEMPORARY: Open DB tier egress for package installation
# ============================================================================
- name: Open DB Tier egress temporarily for package installation
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/security_groups_output.yml
    - ../vars/output_vars.yml

  tasks:
    - name: Add temporary egress rules to DB tier SG
      amazon.aws.ec2_group:
        name: vprofile-db-tier-sg
        description: "Database Tier - Restricted database servers (private subnets)"
        vpc_id: "{{ vpc_id }}"
        region: "{{ region }}"
        purge_rules: false
        purge_rules_egress: true
        rules_egress:
          - proto: udp
            ports: [53]
            cidr_ip: 0.0.0.0/0
            rule_desc: "TEMP - DNS for package install"
          - proto: tcp
            ports: [443]
            cidr_ip: 0.0.0.0/0
            rule_desc: "TEMP - HTTPS for package install"
          - proto: tcp
            ports: [80]
            cidr_ip: 0.0.0.0/0
            rule_desc: "TEMP - HTTP for package install"
        state: present

    - name: Display temporary egress status
      debug:
        msg: "[OPEN] DB tier egress temporarily opened for package installation"

- name: Install Packages on Database Tier
  hosts: db_tier
  serial: 10
  become: true

  vars_files:
    - ../vars/packages.yml

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ packages_common }}"
        state: present

    - name: Install database client tools
      ansible.builtin.apt:
        name: "{{ packages_db }}"
        state: present

    - name: Install monitoring packages
      ansible.builtin.apt:
        name: "{{ packages_db_monitoring }}"
        state: present

    - name: Verify MySQL client
      ansible.builtin.command: mysql --version
      register: mysql_version
      changed_when: false
      ignore_errors: yes

    - name: Verify PostgreSQL client
      ansible.builtin.command: psql --version
      register: psql_version
      changed_when: false
      ignore_errors: yes

    - name: Verify Redis tools
      ansible.builtin.command: redis-cli --version
      register: redis_version
      changed_when: false
      ignore_errors: yes

    - name: Create package installation report
      copy:
        content: |
          Package Installation Report - Database Tier
          =============================================
          Hostname: {{ inventory_hostname }}
          IP: {{ ansible_host }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          Tier: db

          MySQL Client:
          {{ mysql_version.stdout | default('Not installed') }}

          PostgreSQL Client:
          {{ psql_version.stdout | default('Not installed') }}

          Redis CLI:
          {{ redis_version.stdout | default('Not installed') }}

          Database Tools Installed: {{ packages_db | join(', ') }}
          Monitoring Packages: {{ packages_db_monitoring | join(', ') }}
        dest: "/tmp/package_install_{{ inventory_hostname }}.txt"

    - name: Display installation status
      debug:
        msg: "[OK] Database tools installed on {{ inventory_hostname }}"

# ============================================================================
# LOCK DOWN: Remove DB tier egress after package installation
# ============================================================================
- name: Lock down DB Tier egress after package installation
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/security_groups_output.yml
    - ../vars/output_vars.yml

  tasks:
    - name: Remove temporary egress rules from DB tier SG
      amazon.aws.ec2_group:
        name: vprofile-db-tier-sg
        description: "Database Tier - Restricted database servers (private subnets, no outbound)"
        vpc_id: "{{ vpc_id }}"
        region: "{{ region }}"
        purge_rules: false
        purge_rules_egress: true
        rules_egress: []
        state: present

    - name: Display lockdown status
      debug:
        msg: "[LOCKED] DB tier egress locked down - no outbound traffic allowed"
