---
- name: Ansible Vault with CI/CD Pipeline Integration
  hosts: all
  become: true

  vars:
    # Vault-encrypted variables (decrypt at runtime with --vault-password-file or --ask-vault-pass)
    # Use: ansible-vault encrypt_string 'secret_value' --name 'var_name'
    app_name: myapp
    app_dir: /opt/{{ app_name }}
    app_user: "{{ app_name }}"
    config_dir: /etc/{{ app_name }}

    # These would typically be vault-encrypted in a real deployment:
    # ansible-vault encrypt vars/secrets.yml
    db_password: "{{ vault_db_password | default('changeme') }}"
    api_key: "{{ vault_api_key | default('changeme') }}"
    secret_key: "{{ vault_secret_key | default('changeme') }}"
    ssl_private_key: "{{ vault_ssl_private_key | default('') }}"

    # CI/CD environment variables (passed from pipeline)
    deploy_env: "{{ lookup('ansible.builtin.env', 'DEPLOY_ENV') | default('staging', true) }}"
    build_number: "{{ lookup('ansible.builtin.env', 'BUILD_NUMBER') | default('0', true) }}"
    git_commit: "{{ lookup('ansible.builtin.env', 'GIT_COMMIT') | default('unknown', true) }}"

  tasks:
    # ========================================================================
    # VAULT FILE MANAGEMENT
    # ========================================================================
    - name: Create secrets directory with restricted permissions
      ansible.builtin.file:
        path: "{{ config_dir }}/secrets"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0700"
      tags: [secrets]

    - name: Deploy application secrets from vault
      ansible.builtin.copy:
        dest: "{{ config_dir }}/secrets/app.env"
        content: |
          # Auto-generated by Ansible - DO NOT EDIT MANUALLY
          # Deployed: {{ ansible_date_time.iso8601 }}
          # Build: {{ build_number }}
          # Commit: {{ git_commit }}
          # Environment: {{ deploy_env }}

          DB_PASSWORD={{ db_password }}
          API_KEY={{ api_key }}
          SECRET_KEY={{ secret_key }}
          APP_ENV={{ deploy_env }}
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
      no_log: true
      tags: [secrets]

    - name: Deploy SSL private key from vault
      when: ssl_private_key | length > 0
      ansible.builtin.copy:
        dest: "{{ config_dir }}/secrets/ssl.key"
        content: "{{ ssl_private_key }}"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"
      no_log: true
      tags: [secrets, ssl]

    # ========================================================================
    # VAULT PASSWORD FILE FOR CI/CD
    # ========================================================================
    - name: Create vault password script for CI/CD
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: /tmp/vault_password.sh
        content: |
          #!/bin/bash
          # Retrieves vault password from environment variable
          # Set ANSIBLE_VAULT_PASSWORD in your CI/CD pipeline secrets
          echo "${ANSIBLE_VAULT_PASSWORD}"
        mode: "0700"
      tags: [cicd]

    # ========================================================================
    # ENCRYPTED CONFIGURATION FILES
    # ========================================================================
    - name: Deploy database configuration
      ansible.builtin.copy:
        dest: "{{ config_dir }}/database.yml"
        content: |
          # Database configuration - {{ deploy_env }}
          {{ deploy_env }}:
            adapter: postgresql
            host: {{ db_host | default('localhost') }}
            port: {{ db_port | default(5432) }}
            database: {{ db_name | default(app_name + '_' + deploy_env) }}
            username: {{ db_user | default(app_name) }}
            password: {{ db_password }}
            pool: {{ db_pool | default(10) }}
            timeout: 5000
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0640"
      no_log: true
      tags: [config]

    # ========================================================================
    # SECRET ROTATION SUPPORT
    # ========================================================================
    - name: Create secret rotation script
      ansible.builtin.copy:
        dest: /usr/local/bin/rotate-secrets-{{ app_name }}
        content: |
          #!/bin/bash
          # Secret Rotation Script for {{ app_name }}
          # Usage: rotate-secrets-{{ app_name }} [vault-password-file]
          set -euo pipefail

          VAULT_PASS_FILE="${1:-/etc/ansible/vault_pass}"
          SECRETS_FILE="{{ config_dir }}/secrets/app.env"
          BACKUP_DIR="{{ config_dir }}/secrets/backups"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          mkdir -p "$BACKUP_DIR"
          cp "$SECRETS_FILE" "$BACKUP_DIR/app.env.$TIMESTAMP"

          echo "[INFO] Secrets backed up to $BACKUP_DIR/app.env.$TIMESTAMP"
          echo "[INFO] Run ansible-playbook with --vault-password-file to deploy new secrets"

          # Keep only last 5 backups
          ls -t "$BACKUP_DIR"/app.env.* | tail -n +6 | xargs -r rm --
        mode: "0750"
        owner: root
        group: "{{ app_user }}"
      tags: [rotation]

    # ========================================================================
    # CI/CD PIPELINE EXAMPLES
    # ========================================================================
    - name: Display CI/CD integration instructions
      ansible.builtin.debug:
        msg: |
          === Ansible Vault CI/CD Integration ===

          1. ENCRYPT SECRETS:
             ansible-vault encrypt vars/secrets.yml
             ansible-vault encrypt_string 'my_password' --name 'db_password'

          2. GITHUB ACTIONS:
             - Store ANSIBLE_VAULT_PASSWORD as a GitHub Secret
             - In workflow:
               echo "${{ '{{' }} secrets.ANSIBLE_VAULT_PASSWORD {{ '}}' }}" > vault_pass.txt
               ansible-playbook site.yml --vault-password-file vault_pass.txt
               rm vault_pass.txt

          3. JENKINS:
             - Store vault password in Jenkins Credentials
             - Use withCredentials() in Jenkinsfile:
               withCredentials([string(credentialsId: 'vault-pass', variable: 'VAULT_PASS')]) {
                   sh 'echo $VAULT_PASS > vault_pass.txt'
                   sh 'ansible-playbook site.yml --vault-password-file vault_pass.txt'
                   sh 'rm vault_pass.txt'
               }

          4. GITLAB CI:
             - Store ANSIBLE_VAULT_PASSWORD as CI/CD variable (masked)
             - In .gitlab-ci.yml:
               script:
                 - echo "$ANSIBLE_VAULT_PASSWORD" > vault_pass.txt
                 - ansible-playbook site.yml --vault-password-file vault_pass.txt
                 - rm vault_pass.txt

          Deployment info:
            Environment: {{ deploy_env }}
            Build: {{ build_number }}
            Commit: {{ git_commit }}
      tags: [info]
