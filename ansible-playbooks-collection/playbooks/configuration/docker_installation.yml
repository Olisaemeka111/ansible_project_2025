---
# Ansible Playbook: Docker CE Installation
# Installs Docker CE with official repository on Ubuntu 22.04.
# Usage: ansible-playbook docker_installation.yml --limit docker_hosts

- name: Install Docker CE on Ubuntu 22.04
  hosts: all
  become: true
  gather_facts: true

  vars:
    docker_users:
      - "{{ ansible_user | default('ubuntu') }}"
    docker_edition: "ce"
    docker_packages:
      - "docker-{{ docker_edition }}"
      - "docker-{{ docker_edition }}-cli"
      - "containerd.io"
      - "docker-compose-plugin"
      - "docker-buildx-plugin"
    docker_daemon_config:
      log-driver: "json-file"
      log-opts:
        max-size: "10m"
        max-file: "3"
      storage-driver: "overlay2"

  handlers:
    - name: Restart docker service
      ansible.builtin.systemd:
        name: docker
        state: restarted
        daemon_reload: true

  tasks:
    - name: Validate target OS
      tags: [preflight]
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('22.04', '>=')
        fail_msg: "This playbook targets Ubuntu 22.04+. Detected: {{ ansible_distribution }} {{ ansible_distribution_version }}"
        success_msg: "Target OS validated: {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Remove old Docker packages
      tags: [install]
      ansible.builtin.apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Install Docker prerequisites
      tags: [install]
      block:
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

        - name: Install required packages for repository setup
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
              - gnupg
              - lsb-release
              - apt-transport-https
            state: present

    - name: Configure Docker repository
      tags: [install]
      block:
        - name: Create keyrings directory
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Add Docker official GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"
            force: true

        - name: Dearmor Docker GPG key
          ansible.builtin.shell:
            cmd: gpg --dearmor < /etc/apt/keyrings/docker.asc > /etc/apt/keyrings/docker.gpg
            creates: /etc/apt/keyrings/docker.gpg

        - name: Set permissions on GPG key
          ansible.builtin.file:
            path: /etc/apt/keyrings/docker.gpg
            mode: "0644"

        - name: Add Docker apt repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
              signed-by=/etc/apt/keyrings/docker.gpg]
              https://download.docker.com/linux/ubuntu
              {{ ansible_distribution_release }} stable
            state: present
            filename: docker
            update_cache: true

    - name: Install Docker CE packages
      tags: [install]
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: Configure Docker daemon
      tags: [configure]
      block:
        - name: Create Docker configuration directory
          ansible.builtin.file:
            path: /etc/docker
            state: directory
            mode: "0755"

        - name: Deploy Docker daemon configuration
          ansible.builtin.copy:
            content: "{{ docker_daemon_config | to_nice_json }}\n"
            dest: /etc/docker/daemon.json
            owner: root
            group: root
            mode: "0644"
          notify: Restart docker service

    - name: Start and enable Docker service
      tags: [service]
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
        daemon_reload: true

    - name: Add users to docker group
      tags: [configure]
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    - name: Verify Docker installation
      tags: [verify]
      block:
        - name: Get Docker version
          ansible.builtin.command:
            cmd: docker --version
          changed_when: false
          register: docker_version_output

        - name: Display Docker version
          ansible.builtin.debug:
            msg: "{{ docker_version_output.stdout }}"

        - name: Get Docker Compose version
          ansible.builtin.command:
            cmd: docker compose version
          changed_when: false
          register: docker_compose_version_output

        - name: Display Docker Compose version
          ansible.builtin.debug:
            msg: "{{ docker_compose_version_output.stdout }}"

        - name: Run Docker hello-world test
          ansible.builtin.command:
            cmd: docker run --rm hello-world
          changed_when: false
          register: docker_hello
          failed_when: "'Hello from Docker!' not in docker_hello.stdout"
