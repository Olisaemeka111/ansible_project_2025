---
# Playbook: Deploy Rust Rocket Web Application
# Target OS: Ubuntu 22.04
# Requires: Pre-compiled Rust binary (cross-compiled for target architecture)
# Usage: ansible-playbook rust_rocket_deployment.yml -e "binary_source=/path/to/binary server_name=api.example.com"

- name: Deploy Rust Rocket Web Application
  hosts: all
  become: true

  vars:
    app_name: "rocket-app"
    app_dir: "/opt/{{ app_name }}"
    app_port: 8000
    app_user: "rocket"
    app_group: "rocket"
    binary_source: "files/{{ app_name }}"
    binary_name: "{{ app_name }}"
    rocket_env: "release"
    rocket_address: "127.0.0.1"
    rocket_log_level: "normal"
    rocket_workers: 0
    server_name: "api.example.com"
    log_dir: "/var/log/{{ app_name }}"
    data_dir: "/var/lib/{{ app_name }}"
    config_dir: "/etc/{{ app_name }}"
    database_url: ""
    extra_env_vars: {}
    rocket_tls_enabled: false
    rocket_secret_key: ""
    max_open_files: 65535
    memory_limit: "512M"

  handlers:
    - name: Restart rocket
      ansible.builtin.systemd:
        name: "{{ app_name }}"
        state: restarted
        daemon_reload: true
      tags:
        - rocket

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
      tags:
        - rocket

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      tags:
        - nginx

    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
      tags:
        - nginx

  tasks:
    # ------------------------------------------------------------------
    # Application User and Directories
    # ------------------------------------------------------------------
    - name: Create application user and directories
      tags:
        - setup
      block:
        - name: Install prerequisite packages
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
              - libssl3
              - libpq5
            state: present
            update_cache: true

        - name: Create application group
          ansible.builtin.group:
            name: "{{ app_group }}"
            system: true

        - name: Create application user
          ansible.builtin.user:
            name: "{{ app_user }}"
            group: "{{ app_group }}"
            home: "{{ app_dir }}"
            shell: "/usr/sbin/nologin"
            system: true
            create_home: false

        - name: Create application directory
          ansible.builtin.file:
            path: "{{ app_dir }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"

        - name: Create application bin directory
          ansible.builtin.file:
            path: "{{ app_dir }}/bin"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"

        - name: Create log directory
          ansible.builtin.file:
            path: "{{ log_dir }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"

        - name: Create data directory
          ansible.builtin.file:
            path: "{{ data_dir }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0750"

        - name: Create configuration directory
          ansible.builtin.file:
            path: "{{ config_dir }}"
            state: directory
            owner: root
            group: "{{ app_group }}"
            mode: "0750"

    # ------------------------------------------------------------------
    # Binary Deployment
    # ------------------------------------------------------------------
    - name: Deploy Rust Rocket binary
      tags:
        - deploy
        - binary
      block:
        - name: Stop application before binary update
          ansible.builtin.systemd:
            name: "{{ app_name }}"
            state: stopped
          failed_when: false

        - name: Copy pre-built Rust binary
          ansible.builtin.copy:
            src: "{{ binary_source }}"
            dest: "{{ app_dir }}/bin/{{ binary_name }}"
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"
          notify: Restart rocket

        - name: Verify binary is executable
          ansible.builtin.command:
            cmd: "file {{ app_dir }}/bin/{{ binary_name }}"
          changed_when: false
          register: binary_check

        - name: Display binary info
          ansible.builtin.debug:
            msg: "{{ binary_check.stdout }}"

    # ------------------------------------------------------------------
    # Rocket Configuration
    # ------------------------------------------------------------------
    - name: Deploy Rocket configuration
      tags:
        - config
        - rocket
      block:
        - name: Deploy Rocket.toml configuration
          ansible.builtin.template:
            src: "templates/rocket_toml.j2"
            dest: "{{ config_dir }}/Rocket.toml"
            owner: root
            group: "{{ app_group }}"
            mode: "0640"
          notify: Restart rocket

        - name: Deploy environment file
          ansible.builtin.template:
            src: "templates/rust_rocket_env.j2"
            dest: "/etc/default/{{ app_name }}"
            owner: root
            group: "{{ app_group }}"
            mode: "0640"
          notify: Restart rocket

    # ------------------------------------------------------------------
    # Systemd Service Configuration
    # ------------------------------------------------------------------
    - name: Configure systemd service
      tags:
        - service
        - rocket
      block:
        - name: Deploy Rust Rocket systemd service unit
          ansible.builtin.template:
            src: "templates/rust_rocket.service.j2"
            dest: "/etc/systemd/system/{{ app_name }}.service"
            owner: root
            group: root
            mode: "0644"
          notify:
            - Reload systemd
            - Restart rocket

        - name: Ensure Rocket service is enabled and running
          ansible.builtin.systemd:
            name: "{{ app_name }}"
            state: started
            enabled: true
            daemon_reload: true

    # ------------------------------------------------------------------
    # Nginx Reverse Proxy
    # ------------------------------------------------------------------
    - name: Configure Nginx reverse proxy
      tags:
        - nginx
        - config
      block:
        - name: Install Nginx
          ansible.builtin.apt:
            name: nginx
            state: present

        - name: Remove default Nginx site
          ansible.builtin.file:
            path: "/etc/nginx/sites-enabled/default"
            state: absent
          notify: Reload nginx

        - name: Deploy Rocket Nginx configuration
          ansible.builtin.template:
            src: "templates/rust_rocket_nginx.conf.j2"
            dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
            owner: root
            group: root
            mode: "0644"
          notify: Reload nginx

        - name: Enable Rocket Nginx virtual host
          ansible.builtin.file:
            src: "/etc/nginx/sites-available/{{ app_name }}.conf"
            dest: "/etc/nginx/sites-enabled/{{ app_name }}.conf"
            state: link
          notify: Reload nginx

        - name: Validate Nginx configuration
          ansible.builtin.command:
            cmd: "nginx -t"
          changed_when: false

        - name: Ensure Nginx is enabled and running
          ansible.builtin.systemd:
            name: nginx
            state: started
            enabled: true

    # ------------------------------------------------------------------
    # Health Check
    # ------------------------------------------------------------------
    - name: Verify Rust Rocket application health
      tags:
        - verify
      block:
        - name: Wait for Rocket to start listening
          ansible.builtin.wait_for:
            port: "{{ app_port }}"
            host: "{{ rocket_address }}"
            delay: 3
            timeout: 30

        - name: Check application health endpoint
          ansible.builtin.uri:
            url: "http://{{ rocket_address }}:{{ app_port }}"
            status_code:
              - 200
              - 301
              - 302
              - 404
            timeout: 10
          register: health_check
          retries: 5
          delay: 3
          until: health_check is succeeded

        - name: Display service status
          ansible.builtin.command:
            cmd: "systemctl status {{ app_name }} --no-pager"
          changed_when: false
          register: service_status

        - name: Display deployment result
          ansible.builtin.debug:
            msg: "Rust Rocket application '{{ app_name }}' deployed successfully on {{ rocket_address }}:{{ app_port }}"
