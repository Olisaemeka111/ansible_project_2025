---
- name: Deploy Application with Docker Compose
  hosts: all
  become: true

  vars:
    app_name: myapp
    app_dir: /opt/{{ app_name }}
    docker_registry: ""
    image_tag: latest
    compose_services:
      - name: web
        image: "nginx:latest"
        ports:
          - "80:80"
      - name: app
        image: "node:20-alpine"
        ports:
          - "3000:3000"
    compose_env_vars: {}
    docker_user: ubuntu

  handlers:
    - name: Restart docker compose
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ app_dir }}"

  tasks:
    # ========================================================================
    # DOCKER INSTALLATION (if not present)
    # ========================================================================
    - name: Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_check
      changed_when: false
      ignore_errors: true
      tags: [docker]

    - name: Install Docker
      when: docker_check.rc != 0
      block:
        - name: Install prerequisites
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
              - gnupg
            state: present
            update_cache: true

        - name: Add Docker GPG key
          ansible.builtin.apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present

        - name: Add Docker repository
          ansible.builtin.apt_repository:
            repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present
            update_cache: true

        - name: Install Docker packages
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present

        - name: Start and enable Docker
          ansible.builtin.systemd:
            name: docker
            state: started
            enabled: true

        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ docker_user }}"
            groups: docker
            append: true
      tags: [docker]

    # ========================================================================
    # APPLICATION SETUP
    # ========================================================================
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ docker_user }}"
        group: docker
        mode: "0755"
      tags: [setup]

    # ========================================================================
    # DOCKER COMPOSE FILE
    # ========================================================================
    - name: Deploy docker-compose.yml
      ansible.builtin.template:
        src: ../../templates/docker-compose.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ docker_user }}"
        group: docker
        mode: "0644"
      notify: Restart docker compose
      tags: [deploy]

    - name: Deploy environment file
      when: compose_env_vars | length > 0
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        content: |
          # Auto-generated by Ansible
          {% for key, value in compose_env_vars.items() %}
          {{ key }}={{ value }}
          {% endfor %}
        owner: "{{ docker_user }}"
        group: docker
        mode: "0600"
      notify: Restart docker compose
      tags: [deploy]

    # ========================================================================
    # DOCKER REGISTRY LOGIN
    # ========================================================================
    - name: Log in to Docker registry
      when: docker_registry | length > 0
      ansible.builtin.command:
        cmd: >
          docker login {{ docker_registry }}
          --username {{ docker_registry_user | default('') }}
          --password-stdin
      args:
        stdin: "{{ docker_registry_password | default('') }}"
      no_log: true
      changed_when: false
      tags: [registry]

    # ========================================================================
    # DEPLOY
    # ========================================================================
    - name: Pull latest images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ app_dir }}"
      register: pull_result
      changed_when: "'Pulled' in pull_result.stderr or 'Downloaded' in pull_result.stderr"
      tags: [deploy]

    - name: Start services with Docker Compose
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ app_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stderr or 'Created' in compose_up.stderr"
      tags: [deploy]

    # ========================================================================
    # VERIFICATION
    # ========================================================================
    - name: Wait for containers to be healthy
      ansible.builtin.command:
        cmd: docker compose ps --format json
        chdir: "{{ app_dir }}"
      register: compose_ps
      changed_when: false
      retries: 5
      delay: 10
      tags: [verify]

    - name: Display running containers
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ app_dir }}"
      register: compose_status
      changed_when: false
      tags: [verify]

    - name: Show deployment status
      ansible.builtin.debug:
        msg: |
          Docker Compose deployment on {{ inventory_hostname }}:
          Directory: {{ app_dir }}

          {{ compose_status.stdout }}
      tags: [verify]
