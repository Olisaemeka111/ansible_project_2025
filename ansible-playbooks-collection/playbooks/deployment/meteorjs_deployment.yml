---
# Playbook: Deploy Meteor.js Application
# Target OS: Ubuntu 22.04
# Requires: MongoDB instance, pre-built Meteor bundle or source repository
# Usage: ansible-playbook meteorjs_deployment.yml -e "mongo_url=mongodb://db:27017/app root_url=https://app.example.com"

- name: Deploy Meteor.js Application
  hosts: all
  become: true

  vars:
    app_name: "meteor-app"
    app_dir: "/opt/{{ app_name }}"
    app_port: 3000
    app_user: "meteor"
    app_group: "meteor"
    mongo_url: "mongodb://localhost:27017/{{ app_name }}"
    root_url: "https://app.example.com"
    bundle_source: ""
    git_repo: ""
    git_branch: "main"
    node_version: "20"
    server_name: "app.example.com"
    mail_url: ""
    workers: 0
    log_dir: "/var/log/{{ app_name }}"
    extra_env_vars: {}
    build_from_source: false

  handlers:
    - name: Restart meteor
      ansible.builtin.systemd:
        name: "{{ app_name }}"
        state: restarted
        daemon_reload: true
      tags:
        - meteor

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
      tags:
        - meteor

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      tags:
        - nginx

    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
      tags:
        - nginx

  tasks:
    # ------------------------------------------------------------------
    # Node.js Installation
    # ------------------------------------------------------------------
    - name: Install Node.js {{ node_version }}.x
      tags:
        - install
        - nodejs
      block:
        - name: Install prerequisite packages
          ansible.builtin.apt:
            name:
              - software-properties-common
              - apt-transport-https
              - ca-certificates
              - gnupg
              - curl
              - git
              - build-essential
              - python3
            state: present
            update_cache: true

        - name: Add NodeSource GPG key
          ansible.builtin.get_url:
            url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
            dest: "/etc/apt/trusted.gpg.d/nodesource.asc"
            mode: "0644"

        - name: Add NodeSource repository
          ansible.builtin.apt_repository:
            repo: "deb [signed-by=/etc/apt/trusted.gpg.d/nodesource.asc] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
            state: present
            filename: "nodesource"
            update_cache: true

        - name: Install Node.js
          ansible.builtin.apt:
            name: nodejs
            state: present
            update_cache: true

        - name: Verify Node.js installation
          ansible.builtin.command:
            cmd: "node --version"
          changed_when: false
          register: node_check

        - name: Display Node.js version
          ansible.builtin.debug:
            msg: "Node.js {{ node_check.stdout }} installed"

    # ------------------------------------------------------------------
    # Application User Setup
    # ------------------------------------------------------------------
    - name: Create application user and directories
      tags:
        - setup
      block:
        - name: Create Meteor application group
          ansible.builtin.group:
            name: "{{ app_group }}"
            system: true

        - name: Create Meteor application user
          ansible.builtin.user:
            name: "{{ app_user }}"
            group: "{{ app_group }}"
            home: "/home/{{ app_user }}"
            shell: "/bin/bash"
            system: true
            create_home: true

        - name: Create application directory
          ansible.builtin.file:
            path: "{{ app_dir }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"

        - name: Create bundle directory
          ansible.builtin.file:
            path: "{{ app_dir }}/bundle"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"

        - name: Create log directory
          ansible.builtin.file:
            path: "{{ log_dir }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0755"

    # ------------------------------------------------------------------
    # Deploy Pre-built Bundle
    # ------------------------------------------------------------------
    - name: Deploy pre-built Meteor bundle
      tags:
        - deploy
        - bundle
      when: not build_from_source and bundle_source | length > 0
      block:
        - name: Copy Meteor bundle archive
          ansible.builtin.copy:
            src: "{{ bundle_source }}"
            dest: "/tmp/{{ app_name }}-bundle.tar.gz"
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            mode: "0644"

        - name: Extract Meteor bundle
          ansible.builtin.unarchive:
            src: "/tmp/{{ app_name }}-bundle.tar.gz"
            dest: "{{ app_dir }}"
            remote_src: true
            owner: "{{ app_user }}"
            group: "{{ app_group }}"
            extra_opts:
              - "--strip-components=1"

        - name: Install npm dependencies in bundle server
          ansible.builtin.command:
            cmd: "npm install --production"
            chdir: "{{ app_dir }}/bundle/programs/server"
          become_user: "{{ app_user }}"
          environment:
            HOME: "/home/{{ app_user }}"
          register: npm_install
          changed_when: "'added' in npm_install.stdout"
          notify: Restart meteor

    # ------------------------------------------------------------------
    # Build from Source
    # ------------------------------------------------------------------
    - name: Build Meteor from source
      tags:
        - deploy
        - build
      when: build_from_source and git_repo | length > 0
      block:
        - name: Install Meteor CLI
          ansible.builtin.shell:
            cmd: "curl https://install.meteor.com/ | sh"
            creates: "/usr/local/bin/meteor"

        - name: Clone Meteor application repository
          ansible.builtin.git:
            repo: "{{ git_repo }}"
            dest: "{{ app_dir }}/source"
            version: "{{ git_branch }}"
            force: true
          become_user: "{{ app_user }}"

        - name: Install npm dependencies for build
          ansible.builtin.command:
            cmd: "meteor npm install"
            chdir: "{{ app_dir }}/source"
          become_user: "{{ app_user }}"
          environment:
            HOME: "/home/{{ app_user }}"
          register: meteor_npm
          changed_when: "'added' in meteor_npm.stdout"

        - name: Build Meteor bundle
          ansible.builtin.command:
            cmd: "meteor build --directory {{ app_dir }} --server-only"
            chdir: "{{ app_dir }}/source"
          become_user: "{{ app_user }}"
          environment:
            HOME: "/home/{{ app_user }}"
          changed_when: true

        - name: Install server npm dependencies
          ansible.builtin.command:
            cmd: "npm install --production"
            chdir: "{{ app_dir }}/bundle/programs/server"
          become_user: "{{ app_user }}"
          environment:
            HOME: "/home/{{ app_user }}"
          register: server_npm
          changed_when: "'added' in server_npm.stdout"
          notify: Restart meteor

    # ------------------------------------------------------------------
    # Systemd Service Configuration
    # ------------------------------------------------------------------
    - name: Configure Meteor systemd service
      tags:
        - service
        - meteor
      block:
        - name: Deploy Meteor systemd service unit
          ansible.builtin.template:
            src: "templates/meteor.service.j2"
            dest: "/etc/systemd/system/{{ app_name }}.service"
            owner: root
            group: root
            mode: "0644"
          notify:
            - Reload systemd
            - Restart meteor

        - name: Deploy environment file for Meteor service
          ansible.builtin.template:
            src: "templates/meteor_env.j2"
            dest: "/etc/default/{{ app_name }}"
            owner: root
            group: "{{ app_group }}"
            mode: "0640"
          notify: Restart meteor

        - name: Ensure Meteor service is enabled and running
          ansible.builtin.systemd:
            name: "{{ app_name }}"
            state: started
            enabled: true
            daemon_reload: true

    # ------------------------------------------------------------------
    # Nginx Reverse Proxy
    # ------------------------------------------------------------------
    - name: Configure Nginx reverse proxy
      tags:
        - nginx
        - config
      block:
        - name: Install Nginx
          ansible.builtin.apt:
            name: nginx
            state: present

        - name: Remove default Nginx site
          ansible.builtin.file:
            path: "/etc/nginx/sites-enabled/default"
            state: absent
          notify: Reload nginx

        - name: Deploy Meteor Nginx configuration
          ansible.builtin.template:
            src: "templates/meteor_nginx.conf.j2"
            dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
            owner: root
            group: root
            mode: "0644"
          notify: Reload nginx

        - name: Enable Meteor Nginx virtual host
          ansible.builtin.file:
            src: "/etc/nginx/sites-available/{{ app_name }}.conf"
            dest: "/etc/nginx/sites-enabled/{{ app_name }}.conf"
            state: link
          notify: Reload nginx

        - name: Validate Nginx configuration
          ansible.builtin.command:
            cmd: "nginx -t"
          changed_when: false

        - name: Ensure Nginx is enabled and running
          ansible.builtin.systemd:
            name: nginx
            state: started
            enabled: true

    # ------------------------------------------------------------------
    # Health Check
    # ------------------------------------------------------------------
    - name: Verify Meteor application health
      tags:
        - verify
      block:
        - name: Wait for Meteor to start listening
          ansible.builtin.wait_for:
            port: "{{ app_port }}"
            host: "127.0.0.1"
            delay: 5
            timeout: 60

        - name: Check application health endpoint
          ansible.builtin.uri:
            url: "http://127.0.0.1:{{ app_port }}"
            status_code:
              - 200
              - 301
              - 302
            timeout: 10
          register: health_check
          retries: 5
          delay: 5
          until: health_check is succeeded

        - name: Display deployment success
          ansible.builtin.debug:
            msg: "Meteor.js application '{{ app_name }}' deployed successfully on port {{ app_port }}"
