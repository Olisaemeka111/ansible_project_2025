---
- name: Deploy WordPress Application
  hosts: all
  become: true

  vars:
    app_name: wordpress
    app_dir: /var/www/wordpress
    wp_version: "latest"
    server_name: "{{ ansible_fqdn }}"
    db_host: localhost
    db_name: wordpress
    db_user: wp_user
    db_password: "changeme_wp_db_pass"
    db_prefix: wp_
    wp_admin_user: admin
    wp_admin_password: "changeme_wp_admin"
    wp_admin_email: admin@example.com
    wp_locale: en_US
    php_version: "8.2"

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: Restart php-fpm
      ansible.builtin.systemd:
        name: "php{{ php_version }}-fpm"
        state: restarted

  tasks:
    # ========================================================================
    # PHP & EXTENSIONS
    # ========================================================================
    - name: Install PHP and required extensions
      ansible.builtin.apt:
        name:
          - "php{{ php_version }}-fpm"
          - "php{{ php_version }}-mysql"
          - "php{{ php_version }}-curl"
          - "php{{ php_version }}-gd"
          - "php{{ php_version }}-mbstring"
          - "php{{ php_version }}-xml"
          - "php{{ php_version }}-zip"
          - "php{{ php_version }}-intl"
          - "php{{ php_version }}-imagick"
          - "php{{ php_version }}-bcmath"
          - "php{{ php_version }}-soap"
        state: present
        update_cache: true
      tags: [php]

    # ========================================================================
    # MYSQL
    # ========================================================================
    - name: Install MySQL server
      when: db_host == 'localhost'
      block:
        - name: Install MySQL packages
          ansible.builtin.apt:
            name:
              - mysql-server
              - python3-pymysql
            state: present

        - name: Start and enable MySQL
          ansible.builtin.systemd:
            name: mysql
            state: started
            enabled: true

        - name: Create WordPress database
          community.mysql.mysql_db:
            name: "{{ db_name }}"
            state: present
            login_unix_socket: /var/run/mysqld/mysqld.sock

        - name: Create WordPress database user
          community.mysql.mysql_user:
            name: "{{ db_user }}"
            password: "{{ db_password }}"
            priv: "{{ db_name }}.*:ALL"
            host: localhost
            state: present
            login_unix_socket: /var/run/mysqld/mysqld.sock
      tags: [database]

    # ========================================================================
    # NGINX
    # ========================================================================
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
      tags: [nginx]

    # ========================================================================
    # WORDPRESS
    # ========================================================================
    - name: Install WP-CLI
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
        dest: /usr/local/bin/wp
        mode: "0755"
      tags: [wordpress]

    - name: Create WordPress directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
      tags: [wordpress]

    - name: Download WordPress
      ansible.builtin.command:
        cmd: wp core download --path={{ app_dir }} --version={{ wp_version }} --locale={{ wp_locale }} --allow-root
        creates: "{{ app_dir }}/wp-settings.php"
      tags: [wordpress]

    - name: Configure WordPress (wp-config.php)
      ansible.builtin.command:
        cmd: >
          wp config create
          --path={{ app_dir }}
          --dbname={{ db_name }}
          --dbuser={{ db_user }}
          --dbpass={{ db_password }}
          --dbhost={{ db_host }}
          --dbprefix={{ db_prefix }}
          --allow-root
        creates: "{{ app_dir }}/wp-config.php"
      tags: [wordpress]

    - name: Install WordPress core
      ansible.builtin.command:
        cmd: >
          wp core install
          --path={{ app_dir }}
          --url=http://{{ server_name }}
          --title="{{ app_name }}"
          --admin_user={{ wp_admin_user }}
          --admin_password={{ wp_admin_password }}
          --admin_email={{ wp_admin_email }}
          --skip-email
          --allow-root
      register: wp_install
      changed_when: "'already installed' not in wp_install.stdout"
      tags: [wordpress]

    - name: Set WordPress file ownership
      ansible.builtin.file:
        path: "{{ app_dir }}"
        owner: www-data
        group: www-data
        recurse: true
      tags: [wordpress]

    - name: Set directory permissions
      ansible.builtin.command:
        cmd: find {{ app_dir }} -type d -exec chmod 755 {} \;
      changed_when: false
      tags: [wordpress]

    - name: Set file permissions
      ansible.builtin.command:
        cmd: find {{ app_dir }} -type f -exec chmod 644 {} \;
      changed_when: false
      tags: [wordpress]

    # ========================================================================
    # NGINX CONFIGURATION
    # ========================================================================
    - name: Deploy WordPress Nginx configuration
      ansible.builtin.copy:
        dest: /etc/nginx/sites-available/{{ app_name }}
        content: |
          server {
              listen 80;
              server_name {{ server_name }};
              root {{ app_dir }};
              index index.php index.html;

              client_max_body_size 64M;

              location / {
                  try_files $uri $uri/ /index.php?$args;
              }

              location ~ \.php$ {
                  include snippets/fastcgi-php.conf;
                  fastcgi_pass unix:/run/php/php{{ php_version }}-fpm.sock;
                  fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                  include fastcgi_params;
              }

              location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                  expires 30d;
                  add_header Cache-Control "public, immutable";
              }

              location ~ /\.ht {
                  deny all;
              }

              location = /xmlrpc.php {
                  deny all;
              }

              access_log /var/log/nginx/{{ app_name }}_access.log;
              error_log /var/log/nginx/{{ app_name }}_error.log;
          }
        mode: "0644"
      notify: Reload nginx
      tags: [nginx]

    - name: Enable WordPress site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/{{ app_name }}
        dest: /etc/nginx/sites-enabled/{{ app_name }}
        state: link
      notify: Reload nginx
      tags: [nginx]

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx
      tags: [nginx]

    - name: Test Nginx configuration
      ansible.builtin.command: nginx -t
      changed_when: false
      tags: [nginx]

    # ========================================================================
    # START SERVICES
    # ========================================================================
    - name: Ensure services are running
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - nginx
        - "php{{ php_version }}-fpm"
      tags: [services]

    # ========================================================================
    # SUMMARY
    # ========================================================================
    - name: Display WordPress deployment info
      ansible.builtin.debug:
        msg: |
          WordPress deployed successfully!
          URL: http://{{ server_name }}
          Admin: http://{{ server_name }}/wp-admin
          Admin user: {{ wp_admin_user }}
          Database: {{ db_name }} on {{ db_host }}
