---
# Playbook: Deploy Ruby on Rails Application
# Description: Installs Ruby, Bundler, and Node.js, deploys Rails app with Puma
#              as the application server, and configures Nginx reverse proxy.
# Requirements: Ubuntu 22.04 target hosts, database server available
# Tags: rails, ruby, deploy, application

- name: Deploy Ruby on Rails Application
  hosts: all
  become: true

  vars:
    app_name: "railsapp"
    app_dir: "/opt/{{ app_name }}"
    app_user: "railsapp"
    rails_env: "production"
    git_repo: ""
    git_branch: "main"
    puma_workers: 2
    puma_port: 3000
    puma_bind: "tcp://127.0.0.1:{{ puma_port }}"
    puma_threads_min: 5
    puma_threads_max: 5
    server_name: "_"
    rails_master_key: ""
    db_host: "localhost"
    db_name: "{{ app_name }}_production"

  handlers:
    - name: Restart {{ app_name }}
      ansible.builtin.systemd:
        name: "{{ app_name }}"
        state: restarted
        daemon_reload: true
      listen: "restart app"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
      listen: "reload systemd"

    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
      listen: "reload nginx"

    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
      listen: "restart nginx"

  tasks:
    # ------------------------------------------------------------------
    # System dependencies
    # ------------------------------------------------------------------
    - name: Install system packages for Rails deployment
      tags:
        - setup
        - packages
      block:
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

        - name: Install Ruby and system dependencies
          ansible.builtin.apt:
            name:
              - ruby-full
              - build-essential
              - libpq-dev
              - libsqlite3-dev
              - libssl-dev
              - libreadline-dev
              - zlib1g-dev
              - nodejs
              - npm
              - git
              - nginx
            state: present

        - name: Install Bundler gem
          ansible.builtin.gem:
            name: bundler
            state: present
            user_install: false

    # ------------------------------------------------------------------
    # Application user and directories
    # ------------------------------------------------------------------
    - name: Configure application user and directories
      tags:
        - setup
        - user
      block:
        - name: Create application user
          ansible.builtin.user:
            name: "{{ app_user }}"
            system: true
            shell: /bin/bash
            home: "{{ app_dir }}"
            create_home: false

        - name: Create application directory
          ansible.builtin.file:
            path: "{{ app_dir }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_user }}"
            mode: "0755"

        - name: Create shared directories for Rails
          ansible.builtin.file:
            path: "{{ app_dir }}/{{ item }}"
            state: directory
            owner: "{{ app_user }}"
            group: "{{ app_user }}"
            mode: "0755"
          loop:
            - "log"
            - "tmp"
            - "tmp/pids"
            - "tmp/sockets"
            - "tmp/cache"
            - "public"

    # ------------------------------------------------------------------
    # Application code deployment
    # ------------------------------------------------------------------
    - name: Deploy Rails application
      tags:
        - deploy
      block:
        - name: Clone or update application repository
          ansible.builtin.git:
            repo: "{{ git_repo }}"
            dest: "{{ app_dir }}"
            version: "{{ git_branch }}"
            force: true
          become_user: "{{ app_user }}"
          register: git_result
          notify: "restart app"

        - name: Install Ruby dependencies with Bundler (deployment mode)
          ansible.builtin.command:
            cmd: bundle install --deployment --without development test
            chdir: "{{ app_dir }}"
          become_user: "{{ app_user }}"
          environment:
            RAILS_ENV: "{{ rails_env }}"
          changed_when: true
          notify: "restart app"

        - name: Deploy Rails master key
          ansible.builtin.copy:
            content: "{{ rails_master_key }}"
            dest: "{{ app_dir }}/config/master.key"
            owner: "{{ app_user }}"
            group: "{{ app_user }}"
            mode: "0600"
          when: rails_master_key | length > 0
          no_log: true
          notify: "restart app"

        - name: Precompile Rails assets
          ansible.builtin.command:
            cmd: bundle exec rails assets:precompile
            chdir: "{{ app_dir }}"
          become_user: "{{ app_user }}"
          environment:
            RAILS_ENV: "{{ rails_env }}"
            SECRET_KEY_BASE: "{{ rails_master_key | default('placeholder_for_precompile') }}"
          changed_when: true

        - name: Run Rails database migrations
          ansible.builtin.command:
            cmd: bundle exec rails db:migrate
            chdir: "{{ app_dir }}"
          become_user: "{{ app_user }}"
          environment:
            RAILS_ENV: "{{ rails_env }}"
            DATABASE_HOST: "{{ db_host }}"
            DATABASE_NAME: "{{ db_name }}"
          changed_when: true

    # ------------------------------------------------------------------
    # Systemd service
    # ------------------------------------------------------------------
    - name: Configure Puma systemd service
      tags:
        - service
        - systemd
      block:
        - name: Deploy Puma systemd service unit
          ansible.builtin.template:
            src: puma.service.j2
            dest: "/etc/systemd/system/{{ app_name }}.service"
            owner: root
            group: root
            mode: "0644"
          notify:
            - "reload systemd"
            - "restart app"

        - name: Enable and start Puma service
          ansible.builtin.systemd:
            name: "{{ app_name }}"
            enabled: true
            state: started
            daemon_reload: true

    # ------------------------------------------------------------------
    # Nginx reverse proxy
    # ------------------------------------------------------------------
    - name: Configure Nginx reverse proxy
      tags:
        - nginx
        - proxy
      block:
        - name: Remove default nginx site
          ansible.builtin.file:
            path: /etc/nginx/sites-enabled/default
            state: absent
          notify: "reload nginx"

        - name: Deploy Nginx reverse proxy configuration
          ansible.builtin.template:
            src: rails_nginx.conf.j2
            dest: "/etc/nginx/sites-available/{{ app_name }}.conf"
            owner: root
            group: root
            mode: "0644"
          notify: "reload nginx"

        - name: Enable Nginx site configuration
          ansible.builtin.file:
            src: "/etc/nginx/sites-available/{{ app_name }}.conf"
            dest: "/etc/nginx/sites-enabled/{{ app_name }}.conf"
            state: link
          notify: "reload nginx"

        - name: Validate Nginx configuration
          ansible.builtin.command:
            cmd: nginx -t
          changed_when: false

        - name: Ensure Nginx is enabled and running
          ansible.builtin.systemd:
            name: nginx
            enabled: true
            state: started

    # ------------------------------------------------------------------
    # Verification
    # ------------------------------------------------------------------
    - name: Verify Rails deployment
      tags:
        - verify
      block:
        - name: Wait for application to become available
          ansible.builtin.uri:
            url: "http://localhost:{{ puma_port }}/"
            method: GET
            status_code:
              - 200
              - 301
              - 302
          register: health_check
          retries: 10
          delay: 3
          until: health_check is not failed

        - name: Display deployment result
          ansible.builtin.debug:
            msg: "{{ app_name }} (Rails) deployed successfully on port {{ puma_port }}"
