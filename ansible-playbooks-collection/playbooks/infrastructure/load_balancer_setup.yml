---
# Playbook: Configure Nginx as a Load Balancer
# Description: Installs Nginx and configures it as a reverse-proxy load balancer
#              with upstream backend servers and health checks.
# Requirements:
#   - Target hosts running Ubuntu 22.04
#   - SSH access with sudo privileges
#   - Template file: templates/nginx_lb.conf.j2
# Usage:
#   ansible-playbook load_balancer_setup.yml -i inventory/hosts \
#     -e '{"backend_servers": [{"host": "10.0.1.10", "port": 8080}, {"host": "10.0.1.11", "port": 8080}]}'
#   ansible-playbook load_balancer_setup.yml --tags configure

- name: Configure Nginx as a Load Balancer
  hosts: load_balancers
  become: true
  gather_facts: true

  vars:
    # Load balancer configuration
    lb_port: 80
    lb_ssl_port: 443
    lb_algorithm: "least_conn"  # round_robin, least_conn, ip_hash
    lb_server_name: "_"

    # Backend servers - list of dicts with host and port
    backend_servers:
      - host: "10.0.1.10"
        port: 8080
        weight: 1
        max_fails: 3
        fail_timeout: "30s"
      - host: "10.0.1.11"
        port: 8080
        weight: 1
        max_fails: 3
        fail_timeout: "30s"

    # Health check parameters
    health_check_interval: 10
    health_check_timeout: 5
    health_check_unhealthy_threshold: 3

    # Nginx settings
    nginx_worker_processes: "auto"
    nginx_worker_connections: 4096
    nginx_keepalive_timeout: 65
    nginx_client_max_body_size: "50m"

    # Upstream name
    upstream_name: "backend_pool"

    # Logging
    nginx_access_log: "/var/log/nginx/lb_access.log"
    nginx_error_log: "/var/log/nginx/lb_error.log"

    # UFW
    configure_ufw: true

    # Nginx package source
    use_nginx_official_repo: true

  handlers:
    - name: Reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted

    - name: Reload ufw
      ansible.builtin.command:
        cmd: ufw reload
      changed_when: true

  tasks:
    # -------------------------------------------------------------------------
    # Validation
    # -------------------------------------------------------------------------
    - name: Validate backend servers are defined
      ansible.builtin.assert:
        that:
          - backend_servers | length > 0
        fail_msg: >-
          At least one backend server is required. Provide backend_servers as a
          list of dicts with 'host' and 'port' keys.
        success_msg: "{{ backend_servers | length }} backend server(s) configured."
      tags:
        - validate
        - configure

    # -------------------------------------------------------------------------
    # Nginx Installation
    # -------------------------------------------------------------------------
    - name: Install Nginx from official repository
      when: use_nginx_official_repo | bool
      tags:
        - install
      block:
        - name: Install prerequisites
          ansible.builtin.apt:
            name:
              - curl
              - gnupg2
              - ca-certificates
              - lsb-release
              - ubuntu-keyring
            state: present
            update_cache: true

        - name: Add Nginx signing key
          ansible.builtin.apt_key:
            url: "https://nginx.org/keys/nginx_signing.key"
            keyring: /usr/share/keyrings/nginx-archive-keyring.gpg
            state: present

        - name: Add Nginx official repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [signed-by=/usr/share/keyrings/nginx-archive-keyring.gpg]
              https://nginx.org/packages/ubuntu
              {{ ansible_distribution_release }} nginx
            filename: nginx
            state: present

        - name: Install Nginx
          ansible.builtin.apt:
            name: nginx
            state: present
            update_cache: true

    - name: Install Nginx from Ubuntu repository
      when: not (use_nginx_official_repo | bool)
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
      tags:
        - install

    - name: Ensure Nginx service is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true
      tags:
        - install
        - service

    # -------------------------------------------------------------------------
    # Nginx Configuration
    # -------------------------------------------------------------------------
    - name: Remove default Nginx site config
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/default
        - /etc/nginx/conf.d/default.conf
      notify: Reload nginx
      tags:
        - configure

    - name: Create Nginx configuration directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - /etc/nginx/conf.d
        - /etc/nginx/sites-available
        - /etc/nginx/sites-enabled
      tags:
        - configure

    - name: Deploy load balancer configuration
      ansible.builtin.template:
        src: nginx_lb.conf.j2
        dest: /etc/nginx/conf.d/load_balancer.conf
        owner: root
        group: root
        mode: "0644"
        validate: "nginx -t -c /dev/stdin < %s || nginx -t"
      notify: Reload nginx
      tags:
        - configure

    - name: Validate Nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      register: nginx_validation
      changed_when: false
      tags:
        - configure
        - verify

    # -------------------------------------------------------------------------
    # UFW Firewall Rules
    # -------------------------------------------------------------------------
    - name: Configure UFW firewall rules
      when: configure_ufw | bool
      tags:
        - firewall
        - configure
      block:
        - name: Ensure UFW is installed
          ansible.builtin.apt:
            name: ufw
            state: present

        - name: Allow load balancer port through UFW
          community.general.ufw:
            rule: allow
            port: "{{ lb_port | string }}"
            proto: tcp
            comment: "Nginx load balancer HTTP"
          notify: Reload ufw

        - name: Allow HTTPS port through UFW
          community.general.ufw:
            rule: allow
            port: "{{ lb_ssl_port | string }}"
            proto: tcp
            comment: "Nginx load balancer HTTPS"
          when: lb_ssl_port is defined
          notify: Reload ufw

        - name: Allow SSH through UFW
          community.general.ufw:
            rule: allow
            port: "22"
            proto: tcp
            comment: "SSH access"

        - name: Enable UFW
          community.general.ufw:
            state: enabled
            policy: deny
            direction: incoming

    # -------------------------------------------------------------------------
    # Verification
    # -------------------------------------------------------------------------
    - name: Verify Nginx is running and listening
      ansible.builtin.wait_for:
        port: "{{ lb_port }}"
        host: "0.0.0.0"
        delay: 2
        timeout: 30
        state: started
      tags:
        - verify

    - name: Display load balancer configuration summary
      ansible.builtin.debug:
        msg:
          - "============================================="
          - "  Nginx Load Balancer - Configuration"
          - "============================================="
          - "Listen Port:     {{ lb_port }}"
          - "Algorithm:       {{ lb_algorithm }}"
          - "Upstream Name:   {{ upstream_name }}"
          - "Backend Servers:"
          - "{% for server in backend_servers %}  - {{ server.host }}:{{ server.port }} (weight={{ server.weight | default(1) }}){% endfor %}"
          - "Access Log:      {{ nginx_access_log }}"
          - "Error Log:       {{ nginx_error_log }}"
          - "UFW Configured:  {{ configure_ufw }}"
          - "============================================="
      tags:
        - verify
