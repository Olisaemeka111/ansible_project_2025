---
# Playbook: Create AWS VPC with Full Networking Stack
# Description: Builds a production-ready VPC with public/private subnets,
#              internet gateway, NAT gateway, and route tables.
# Requirements:
#   - ansible-galaxy collection install amazon.aws
#   - AWS credentials configured
# Usage:
#   ansible-playbook vpc_setup.yml
#   ansible-playbook vpc_setup.yml -e "project_name=myapp environment=production"
#   ansible-playbook vpc_setup.yml --tags subnets

- name: Create AWS VPC with Full Networking
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: "us-east-2"
    vpc_cidr: "10.0.0.0/16"
    vpc_name: "ansible-managed-vpc"
    project_name: "infrastructure"
    environment: "development"
    public_subnets:
      - cidr: "10.0.1.0/24"
        az: "{{ aws_region }}a"
        name: "public-subnet-1"
      - cidr: "10.0.2.0/24"
        az: "{{ aws_region }}b"
        name: "public-subnet-2"
    private_subnets:
      - cidr: "10.0.3.0/24"
        az: "{{ aws_region }}a"
        name: "private-subnet-1"
      - cidr: "10.0.4.0/24"
        az: "{{ aws_region }}b"
        name: "private-subnet-2"
    enable_dns_support: true
    enable_dns_hostnames: true
    common_tags:
      Project: "{{ project_name }}"
      Environment: "{{ environment }}"
      ManagedBy: "ansible"

  tasks:
    # -------------------------------------------------------------------------
    # VPC
    # -------------------------------------------------------------------------
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        dns_support: "{{ enable_dns_support }}"
        dns_hostnames: "{{ enable_dns_hostnames }}"
        tags: "{{ common_tags | combine({'Name': vpc_name}) }}"
        state: present
      register: vpc_result
      tags:
        - vpc
        - network

    - name: Store VPC ID
      ansible.builtin.set_fact:
        vpc_id: "{{ vpc_result.vpc.id }}"
      tags:
        - vpc
        - network

    # -------------------------------------------------------------------------
    # Internet Gateway
    # -------------------------------------------------------------------------
    - name: Create Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        tags: "{{ common_tags | combine({'Name': project_name + '-igw'}) }}"
        state: present
      register: igw_result
      tags:
        - igw
        - network

    # -------------------------------------------------------------------------
    # Public Subnets
    # -------------------------------------------------------------------------
    - name: Create public subnets
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc_id }}"
        cidr: "{{ item.cidr }}"
        az: "{{ item.az }}"
        region: "{{ aws_region }}"
        map_public: true
        tags: "{{ common_tags | combine({'Name': project_name + '-' + item.name, 'Tier': 'public'}) }}"
        state: present
      loop: "{{ public_subnets }}"
      loop_control:
        label: "{{ item.name }} ({{ item.cidr }})"
      register: public_subnet_results
      tags:
        - subnets
        - network

    # -------------------------------------------------------------------------
    # Private Subnets
    # -------------------------------------------------------------------------
    - name: Create private subnets
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc_id }}"
        cidr: "{{ item.cidr }}"
        az: "{{ item.az }}"
        region: "{{ aws_region }}"
        map_public: false
        tags: "{{ common_tags | combine({'Name': project_name + '-' + item.name, 'Tier': 'private'}) }}"
        state: present
      loop: "{{ private_subnets }}"
      loop_control:
        label: "{{ item.name }} ({{ item.cidr }})"
      register: private_subnet_results
      tags:
        - subnets
        - network

    # -------------------------------------------------------------------------
    # Elastic IP for NAT Gateway
    # -------------------------------------------------------------------------
    - name: Allocate Elastic IP for NAT Gateway
      amazon.aws.ec2_eip:
        region: "{{ aws_region }}"
        in_vpc: true
        tags: "{{ common_tags | combine({'Name': project_name + '-nat-eip'}) }}"
        state: present
      register: nat_eip
      tags:
        - nat
        - network

    # -------------------------------------------------------------------------
    # NAT Gateway
    # -------------------------------------------------------------------------
    - name: Create NAT Gateway in first public subnet
      amazon.aws.ec2_vpc_nat_gateway:
        subnet_id: "{{ public_subnet_results.results[0].subnet.id }}"
        allocation_id: "{{ nat_eip.allocation_id }}"
        region: "{{ aws_region }}"
        tags: "{{ common_tags | combine({'Name': project_name + '-nat-gw'}) }}"
        wait: true
        wait_timeout: 300
        state: present
      register: nat_gw_result
      tags:
        - nat
        - network

    # -------------------------------------------------------------------------
    # Public Route Table (routes through Internet Gateway)
    # -------------------------------------------------------------------------
    - name: Create public route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        subnets: "{{ public_subnet_results.results | map(attribute='subnet.id') | list }}"
        routes:
          - dest: "0.0.0.0/0"
            gateway_id: "{{ igw_result.gateway_id }}"
        tags: "{{ common_tags | combine({'Name': project_name + '-public-rt'}) }}"
        state: present
      register: public_rt_result
      tags:
        - routes
        - network

    # -------------------------------------------------------------------------
    # Private Route Table (routes through NAT Gateway)
    # -------------------------------------------------------------------------
    - name: Create private route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc_id }}"
        region: "{{ aws_region }}"
        subnets: "{{ private_subnet_results.results | map(attribute='subnet.id') | list }}"
        routes:
          - dest: "0.0.0.0/0"
            nat_gateway_id: "{{ nat_gw_result.nat_gateway_id }}"
        tags: "{{ common_tags | combine({'Name': project_name + '-private-rt'}) }}"
        state: present
      register: private_rt_result
      tags:
        - routes
        - network

    # -------------------------------------------------------------------------
    # Summary
    # -------------------------------------------------------------------------
    - name: Display VPC resource summary
      ansible.builtin.debug:
        msg:
          - "============================================="
          - "  VPC Networking Stack - Resource Summary"
          - "============================================="
          - "VPC ID:              {{ vpc_id }}"
          - "VPC CIDR:            {{ vpc_cidr }}"
          - "Internet Gateway:    {{ igw_result.gateway_id }}"
          - "NAT Gateway:         {{ nat_gw_result.nat_gateway_id }}"
          - "NAT EIP:             {{ nat_eip.public_ip }}"
          - "Public Subnets:"
          - "  - {{ public_subnet_results.results[0].subnet.id }} ({{ public_subnets[0].cidr }} / {{ public_subnets[0].az }})"
          - "  - {{ public_subnet_results.results[1].subnet.id }} ({{ public_subnets[1].cidr }} / {{ public_subnets[1].az }})"
          - "Private Subnets:"
          - "  - {{ private_subnet_results.results[0].subnet.id }} ({{ private_subnets[0].cidr }} / {{ private_subnets[0].az }})"
          - "  - {{ private_subnet_results.results[1].subnet.id }} ({{ private_subnets[1].cidr }} / {{ private_subnets[1].az }})"
          - "Public Route Table:  {{ public_rt_result.route_table.id }}"
          - "Private Route Table: {{ private_rt_result.route_table.id }}"
          - "============================================="
      tags:
        - verify
        - network
