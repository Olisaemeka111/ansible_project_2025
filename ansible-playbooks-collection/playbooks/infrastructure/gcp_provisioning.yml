---
# Playbook: Provision Google Cloud Compute Engine Instances
# Description: Creates GCE instances using the google.cloud collection.
# Requirements:
#   - ansible-galaxy collection install google.cloud
#   - pip install google-auth requests
#   - GCP service account JSON key or Application Default Credentials
# Usage:
#   ansible-playbook gcp_provisioning.yml -e "project=my-gcp-project"
#   ansible-playbook gcp_provisioning.yml --tags provision

- name: Provision Google Cloud Compute Engine Instances
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gcp_project: ""
    gcp_zone: "us-central1-a"
    gcp_region: "us-central1"
    machine_type: "e2-medium"
    instance_name: "ansible-managed-instance"
    image_family: "ubuntu-2204-lts"
    image_project: "ubuntu-os-cloud"
    network: "default"
    subnet: "default"
    disk_size_gb: 20
    disk_type: "pd-ssd"
    service_account_file: ""
    instance_labels:
      environment: "development"
      managed_by: "ansible"
      project: "infrastructure"
    instance_tags:
      - "http-server"
      - "https-server"
      - "ssh"
    enable_public_ip: true
    preemptible: false

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - gcp_project | length > 0
        fail_msg: >-
          GCP project is required. Provide it with: -e "gcp_project=my-project"
        success_msg: "All required variables are set."
      tags:
        - provision
        - validate

    - name: Create a boot disk
      google.cloud.gcp_compute_disk:
        name: "{{ instance_name }}-boot-disk"
        size_gb: "{{ disk_size_gb }}"
        type: "{{ disk_type }}"
        source_image: "projects/{{ image_project }}/global/images/family/{{ image_family }}"
        zone: "{{ gcp_zone }}"
        project: "{{ gcp_project }}"
        service_account_file: "{{ service_account_file | default(omit) }}"
        labels: "{{ instance_labels }}"
        state: present
      register: boot_disk
      tags:
        - provision
        - disk

    - name: Provision GCE instance
      google.cloud.gcp_compute_instance:
        name: "{{ instance_name }}"
        machine_type: "{{ machine_type }}"
        zone: "{{ gcp_zone }}"
        project: "{{ gcp_project }}"
        service_account_file: "{{ service_account_file | default(omit) }}"
        labels: "{{ instance_labels }}"
        tags:
          items: "{{ instance_tags }}"
        disks:
          - auto_delete: true
            boot: true
            source: "{{ boot_disk }}"
        network_interfaces:
          - network:
              selfLink: "projects/{{ gcp_project }}/global/networks/{{ network }}"
            subnetwork:
              selfLink: "projects/{{ gcp_project }}/regions/{{ gcp_region }}/subnetworks/{{ subnet }}"
            access_configs: "{{ [{'name': 'External NAT', 'type': 'ONE_TO_ONE_NAT'}] if enable_public_ip else [] }}"
        scheduling:
          preemptible: "{{ preemptible }}"
        metadata:
          enable-oslogin: "TRUE"
        state: present
      register: gce_instance
      tags:
        - provision

    - name: Display instance details
      ansible.builtin.debug:
        msg:
          - "Instance Name: {{ gce_instance.name }}"
          - "Status: {{ gce_instance.status }}"
          - "Machine Type: {{ machine_type }}"
          - "Zone: {{ gcp_zone }}"
          - "Self Link: {{ gce_instance.selfLink | default('N/A') }}"
          - "Internal IP: {{ gce_instance.networkInterfaces[0].networkIP | default('N/A') }}"
          - "External IP: {{ gce_instance.networkInterfaces[0].accessConfigs[0].natIP | default('No public IP') }}"
      when: gce_instance is defined
      tags:
        - provision
        - verify

    - name: Wait for SSH to become available
      ansible.builtin.wait_for:
        host: "{{ gce_instance.networkInterfaces[0].accessConfigs[0].natIP }}"
        port: 22
        delay: 10
        timeout: 300
        state: started
      when:
        - gce_instance is defined
        - enable_public_ip | bool
        - gce_instance.networkInterfaces[0].accessConfigs[0].natIP is defined
      tags:
        - provision
        - wait
